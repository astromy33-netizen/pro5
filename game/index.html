<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Developer Portfolio</title>
    <style>
        :root {
            --primary: #00f260;
            --secondary: #0575E6;
            --bg-dark: #0f0c29;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s ease forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(#fff, #ddd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .role {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: #eee;
        }

        .icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .icon-box:hover {
            transform: scale(1.2) rotate(10deg);
            background: rgba(255,255,255,0.4);
        }

        .projects {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        @media (max-width: 600px) {
            .projects { grid-template-columns: 1fr; }
        }

        .card {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            transition: 0.3s;
            text-decoration: none;
            color: white;
            border: 1px solid transparent;
        }

        .card:hover {
            background: rgba(0,0,0,0.5);
            border-color: #00f260;
            transform: translateY(-5px);
        }

        .contacts {
            margin-top: 40px;
            font-size: 0.9rem;
        }

        .contacts a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
            padding: 5px 15px;
            border: 1px solid white;
            border-radius: 20px;
            transition: 0.3s;
        }

        .contacts a:hover {
            background: white;
            color: #333;
        }

        /* Мини-игра */
        .game-area {
            margin-top: 30px;
            height: 60px;
            position: relative;
            background: rgba(0,0,0,0.2);
            border-radius: 30px;
            overflow: hidden;
            cursor: crosshair;
        }
        
        #catchMeBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 8px 20px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Frontend Developer</h1>
        <div class="role">Creating Digital Experiences</div>

        <div class="icons">
            <div class="icon-box" title="JavaScript">JS</div>
            <div class="icon-box" title="React">⚛️</div>
            <div class="icon-box" title="HTML5">HTML</div>
            <div class="icon-box" title="CSS3">CSS</div>
        </div>

        <p>Привет! Я создаю плавные и красивые интерфейсы. Вот мои работы:</p>

        <div class="projects">
            <a href="https://portfolio-theta-teal-35vu09vtg8.vercel.app/" target="_blank" class="card">
                <h3>💼 Portfolio</h3>
                <p>Моя визитная карточка</p>
            </a>
            <a href="https://veb-1-y5dr.vercel.app/" target="_blank" class="card">
                <h3>🌐 Project Veb-1</h3>
                <p>Лендинг пейдж</p>
            </a>
        </div>

        <div class="game-area">
            <button id="catchMeBtn" onmouseover="moveButton()">Поймай меня!</button>
        </div>
        <p style="font-size: 12px; opacity: 0.7;">(Наведи на красную кнопку)</p>

        <div class="contacts">
            <a href="https://t.me/wert1yq">✈️ Telegram</a>
            <a href="tel:0507193836">📞 0507193836</a>
        </div>
    </div>

    <script>
        // Скрипт для мини-игры
        function moveButton() {
            const btn = document.getElementById('catchMeBtn');
            const area = document.querySelector('.game-area');
            
            // Получаем размеры
            const areaWidth = area.clientWidth;
            const areaHeight = area.clientHeight;
            
            // Генерируем случайную позицию
            const newX = Math.random() * (areaWidth - 100); // 100 - примерная ширина кнопки
            const newY = Math.random() * (areaHeight - 40); // 40 - высота кнопки
            
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
            btn.style.transform = 'none'; // Убираем центрирование после первого движения
            
            // Меняем цвет для веселья
            const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502'];
            btn.style.background = colors[Math.floor(Math.random() * colors.length)];
        }
    </script>

</body>
</html>
